<!DOCTYPE html> <html lang="fr"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Historique des Recensements</title> <!-- Leaflet & MarkerCluster CSS --> <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" /> <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" /> <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" /> <style> body { margin:0; padding:0; font-family: Arial, sans-serif; background:#f7f7f7; color:#111; } #controls { padding:10px; text-align:center; background:#f7f9f7; display:flex; flex-wrap:wrap; justify-content:center; gap:10px; align-items:center; } select { padding:5px 10px; border-radius:5px; border:1px solid #ccc; } #map { height: 80vh; width: 100%; margin-bottom:10px; } #stats { text-align:center; margin-bottom:10px; font-weight:bold; color:#4CAF50; } </style> </head> <body> <div id="controls"> Région : <select id="regionFilter"> <option value="all">Belgique entière</option> <option value="wallonie">Wallonie</option> <option value="flandre">Flandre</option> </select> Année : <select id="yearFilter"> <option value="all">Toutes</option> </select> </div> <div id="stats">Chargement des recensements...</div> <div id="map"></div> <!-- Leaflet & MarkerCluster JS --> <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script> <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script> <script type="module"> import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js"; import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js"; // --- Config Firebase --- const firebaseConfig = { apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys", authDomain: "herisson-f80ba.firebaseapp.com", projectId: "herisson-f80ba", storageBucket: "herisson-f80ba.firebasestorage.app", messagingSenderId: "142270421417", appId: "1:142270421417:web:cb3abd700fab6731c40cb8" }; const app = initializeApp(firebaseConfig); const db = getFirestore(app); // --- Carte --- const belgiqueBounds = [[49.5, 2.5], [51.6, 6.4]]; const map = L.map('map', { maxBounds: belgiqueBounds, maxBoundsViscosity: 1.0, minZoom: 7, maxZoom: 12 }).setView([50.8467, 4.3525], 8); L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map); // --- Polygones approximatifs des régions --- const wallonieBounds = [[49.5, 4.5],[50.5, 6.4]]; // SW & NE approx const flandreBounds = [[50.5, 2.5],[51.6, 5.0]]; function isInside(lat, lon, bounds) { return lat >= bounds[0][0] && lat <= bounds[1][0] && lon >= bounds[0][1] && lon <= bounds[1][1]; } // --- Marker Cluster --- const markers = L.markerClusterGroup(); map.addLayer(markers); let allRecensements = []; // --- Chargement des recensements --- async function loadRecensements() { const querySnapshot = await getDocs(collection(db, "recensements")); const yearsSet = new Set(); querySnapshot.forEach(doc => { const data = doc.data(); if(data.latitude && data.longitude){ allRecensements.push(data); if(data.date) yearsSet.add(data.date.substring(0,4)); } }); populateYearFilter([...yearsSet].sort((a,b)=>b-a)); displayMarkers(); } // --- Remplir le filtre années --- function populateYearFilter(years) { const yearSelect = document.getElementById('yearFilter'); years.forEach(year => { const option = document.createElement('option'); option.value = year; option.textContent = year; yearSelect.appendChild(option); }); } // --- Affichage des marqueurs --- function displayMarkers() { markers.clearLayers(); const selectedRegion = document.getElementById("regionFilter").value; const selectedYear = document.getElementById("yearFilter").value; const filtered = allRecensements.filter(data => { const regionMatch = selectedRegion === "all" || (selectedRegion === 'wallonie' ? isInside(data.latitude, data.longitude, wallonieBounds) : isInside(data.latitude, data.longitude, flandreBounds)); const yearMatch = selectedYear === "all" || (data.date && data.date.startsWith(selectedYear)); return regionMatch && yearMatch; }); filtered.forEach(data => { const marker = L.circleMarker([data.latitude, data.longitude], { color: '#4CAF50', radius: 7, fillOpacity: 0.8 }); const popupContent = <b>Date :</b> ${data.date || 'N/A'}<br> <b>Observation :</b> ${data.methode || 'N/A'}<br> ${data.notes ? <b>Notes :</b> ${data.notes}<br> : ''} ${data.userName ? <b>Nom :</b> ${data.userName}<br> : ''} ${data.userEmail ? <b>Email :</b> ${data.userEmail} : ''} ; marker.bindPopup(popupContent); markers.addLayer(marker); }); updateStats(filtered); } // --- Statistiques --- function updateStats(filtered) { document.getElementById('stats').textContent = Recensements affichés : ${filtered.length}; } // --- Listeners --- document.getElementById('regionFilter').addEventListener('change', displayMarkers); document.getElementById('yearFilter').addEventListener('change', displayMarkers); // --- Chargement initial --- loadRecensements(); </script> </body> </html>
