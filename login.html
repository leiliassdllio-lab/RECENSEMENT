<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – Hérisson</title>
<style>
body { font-family: Arial,sans-serif; background:#f7f9f7; margin:0; padding:0; }
header, footer { background:#4CAF50; color:white; text-align:center; padding:10px 0; }
.container { max-width:400px; margin:50px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
h2 { text-align:center; color:#4CAF50; margin-bottom:20px; }
input, button { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; box-sizing:border-box; }
button { background:#4CAF50; color:white; border:none; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { background:#43a047; }
</style>
</head>
<body>

<header><h1>🦔 Connexion / Inscription</h1></header>

<div class="container">
  <h2>Se connecter</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Mot de passe">
  <button id="loginBtn">Se connecter</button>

  <h2>Créer un compte</h2>
  <input type="email" id="signupEmail" placeholder="Email">
  <input type="password" id="signupPassword" placeholder="Mot de passe">
  <button id="signupBtn">Créer un compte</button>
</div>

<footer>© <span id="year"></span> – Team Hérisson</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// --- Config Firebase ---
const firebaseConfig = {
  apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
  authDomain: "herisson-f80ba.firebaseapp.com",
  projectId: "herisson-f80ba",
  storageBucket: "herisson-f80ba.firebasestorage.app",
  messagingSenderId: "142270421417",
  appId: "1:142270421417:web:cb3abd700fab6731c40cb8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Affichage année
document.getElementById("year").textContent = new Date().getFullYear();

// --- Création compte ---
document.getElementById("signupBtn").addEventListener("click", async () => {
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;
  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Compte créé avec succès !");
    window.location.href = "Recensement.html";
  } catch(e) { alert(e.message); }
});

// --- Connexion ---
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Connecté !");
    window.location.href = "Recensement.html";
  } catch(e) { alert(e.message); }
});
</script>

</body>
</html>
