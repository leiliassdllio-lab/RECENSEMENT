<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hérisson – Team hérisson</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:#f0f6f0;
}

header{
background:#4CAF50;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1000px;
margin:20px auto;
padding:10px;
}

.quiz-cards{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.quiz-card{
background:#e8f5e9;
border-radius:10px;
padding:20px;
width:260px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
transition:transform 0.2s;
}

.quiz-card:hover{
transform:translateY(-5px);
}

.score-bar-container{
width:100%;
height:12px;
background:#ddd;
border-radius:6px;
overflow:hidden;
margin-top:5px;
}

.score-bar{
width:0%;
height:100%;
background:#4CAF50;
transition:width 0.4s;
}

#quiz-container{
display:none;
max-width:600px;
margin:30px auto;
}

#answers button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.correct{
background:#4CAF50;
color:white;
}

.wrong{
background:#f44336;
color:white;
}

#progress-container{
background:#ddd;
border-radius:10px;
overflow:hidden;
height:18px;
margin-bottom:20px;
}

#progress-bar{
width:0%;
height:100%;
background:#4CAF50;
transition:width 0.3s;
}

.btn{
padding:10px 15px;
background:#4CAF50;
color:white;
border-radius:6px;
text-decoration:none;
display:inline-block;
margin-top:15px;
}

</style>
</head>

<body>

<header>
<h1>Quiz Hérisson 🦔</h1>
</header>

<div class="container">

<div class="quiz-cards">

<div class="quiz-card" onclick="selectQuiz('scientifique')">
<h3>🔬 Scientifique</h3>
<p>Biologie du hérisson</p>
<div class="score-bar-container">
<div id="score-bar-scientifique" class="score-bar"></div>
</div>
</div>

<div class="quiz-card" onclick="selectQuiz('comportement')">
<h3>🦔 Comportement</h3>
<p>Comment réagir face à un hérisson</p>
<div class="score-bar-container">
<div id="score-bar-comportement" class="score-bar"></div>
</div>
</div>

<div class="quiz-card" onclick="selectQuiz('ecologie')">
<h3>🌳 Ecologie</h3>
<p>Habitat et environnement</p>
<div class="score-bar-container">
<div id="score-bar-ecologie" class="score-bar"></div>
</div>
</div>

<div class="quiz-card" onclick="selectQuiz('sante')">
<h3>💉 Santé</h3>
<p>Maladies et soins</p>
<div class="score-bar-container">
<div id="score-bar-sante" class="score-bar"></div>
</div>
</div>

</div>

<div id="quiz-container">

<div id="progress-container">
<div id="progress-bar"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="feedback"></p>

<button class="btn" onclick="backToSelection()">Retour</button>

</div>

</div>

<footer style="text-align:center;padding:15px;background:#4CAF50;color:white;">
© <span id="year"></span> – Team hérisson
</footer>

<script>

document.getElementById("year").textContent = new Date().getFullYear();

const quizzes = {

scientifique:[
{question:"Le hérisson est principalement :",answers:["Herbivore","Carnivore insectivore","Omnivore","Granivore"],correct:1},
{question:"Combien de piquants possède un hérisson adulte ?",answers:["500","1500","5000 à 7000","20000"],correct:2},
{question:"Le hérisson hiberne :",answers:["Eté","Automne","Hiver","Printemps"],correct:2}
],

comportement:[
{question:"Que faire si un hérisson est blessé ?",answers:["Le laisser","Centre de soins","Le nourrir","Le déplacer loin"],correct:1},
{question:"Le hérisson est actif :",answers:["Jour","Nuit","Matin","Midi"],correct:1},
{question:"Comment le manipuler ?",answers:["Main nue","Avec gants","Jamais","Avec bâton"],correct:1}
],

ecologie:[
{question:"Habitat préféré ?",answers:["Désert","Jardins et haies","Mer","Glacier"],correct:1},
{question:"Ils mangent principalement :",answers:["Insectes","Herbe","Poisson","Fruit"],correct:0},
{question:"Les routes causent :",answers:["Mort","Protection","Rien","Migration"],correct:0}
],

sante:[
{question:"Le lait de vache est :",answers:["Bon","Mauvais","Indifférent","Recommandé"],correct:1},
{question:"Parasites possibles ?",answers:["Puces et tiques","Aucun","Serpents","Poissons"],correct:0},
{question:"Un hérisson blessé doit :",answers:["Centre de soins","Maison","Forêt","Route"],correct:0}
]

};

let currentQuiz = null;
let currentQuestion = 0;
let score = 0;
let currentQuizName = "";

function selectQuiz(name){

currentQuiz = quizzes[name];
currentQuizName = name;
currentQuestion = 0;
score = 0;

document.getElementById("quiz-container").style.display = "block";
document.querySelector(".quiz-cards").style.display = "none";

loadQuestion();
updateProgress();

}

function loadQuestion(){

const q = currentQuiz[currentQuestion];

document.getElementById("question").textContent =
"Question "+(currentQuestion+1)+" / "+currentQuiz.length+" : "+q.question;

const answers = document.getElementById("answers");
answers.innerHTML = "";

q.answers.forEach((a,i)=>{

const btn = document.createElement("button");
btn.textContent = a;

btn.onclick = ()=>answerQuestion(i);

answers.appendChild(btn);

});

}

function answerQuestion(selected){

const q = currentQuiz[currentQuestion];
const buttons = document.getElementById("answers").children;

for(let i=0;i<buttons.length;i++){

if(i===q.correct) buttons[i].classList.add("correct");
else if(i===selected) buttons[i].classList.add("wrong");

}

if(selected===q.correct) score++;

setTimeout(()=>{

currentQuestion++;

if(currentQuestion<currentQuiz.length){

loadQuestion();
updateProgress();

}else{

finishQuiz();

}

},900);

}

function updateProgress(){

const percent = (currentQuestion/currentQuiz.length)*100;
document.getElementById("progress-bar").style.width = percent+"%";

}

function finishQuiz(){

document.getElementById("question").textContent="Quiz terminé !";

document.getElementById("answers").innerHTML="";

document.getElementById("feedback").textContent =
"Score : "+score+" / "+currentQuiz.length;

document.getElementById("progress-bar").style.width="100%";

const bar = document.getElementById("score-bar-"+currentQuizName);
const percent = (score/currentQuiz.length)*100;

bar.style.width = percent+"%";

}

function backToSelection(){

document.getElementById("quiz-container").style.display="none";
document.querySelector(".quiz-cards").style.display="flex";
document.getElementById("feedback").textContent="";
document.getElementById("progress-bar").style.width="0%";

}

</script>

</body>
</html>
