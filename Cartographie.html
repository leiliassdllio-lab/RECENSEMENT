<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cartographie des observations</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

</head>

<body>


<div class="map-page">

<h1 class="map-title">Cartographie des observations de hérissons</h1>

<p class="map-description">
Cette carte présente les observations du hérisson d’Europe
collectées par les citoyens en Belgique.
Chaque point correspond à un signalement enregistré.
</p>


<div id="controls">

Afficher les observations :

<select id="regionFilter">

<option value="all">Belgique entière</option>
<option value="wallonie">Wallonie</option>
<option value="flandre">Flandre</option>

</select>

</div>


<div id="map"></div>


<div class="map-legend">

<b>Légende</b><br><br>

<span class="legend-dot"></span>
Observation de hérisson

</div>


<div id="stats"></div>

</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
authDomain: "herisson-f80ba.firebaseapp.com",
projectId: "herisson-f80ba",
storageBucket: "herisson-f80ba.firebasestorage.app",
messagingSenderId: "142270421417",
appId: "1:142270421417:web:cb3abd700fab6731c40cb8"

};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



const belgiqueBounds = [[49.5, 2.5], [51.6, 6.4]];

const map = L.map('map',{

maxBounds: belgiqueBounds,
maxBoundsViscosity:1.0,
minZoom:7,
maxZoom:12

}).setView([50.8467,4.3525],8);



L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{

attribution:'© OpenStreetMap'

}).addTo(map);



const wallonieBounds=[[49.5,4.5],[50.5,6.4]];
const flandreBounds=[[50.5,2.5],[51.6,5.0]];



function isInside(lat,lon,bounds){

return lat>=bounds[0][0] &&
lat<=bounds[1][0] &&
lon>=bounds[0][1] &&
lon<=bounds[1][1];

}



const markers=L.markerClusterGroup();

map.addLayer(markers);



let allRecensements=[];



async function loadRecensements(){

const querySnapshot=await getDocs(collection(db,"recensements"));

querySnapshot.forEach(doc=>{

const data=doc.data();

if(data.latitude && data.longitude){

allRecensements.push(data);

}

});

displayMarkers('all');

}



function displayMarkers(region){

markers.clearLayers();

let filtered=allRecensements;



if(region==='wallonie'){

filtered=allRecensements.filter(d=>
isInside(d.latitude,d.longitude,wallonieBounds));

}

else if(region==='flandre'){

filtered=allRecensements.filter(d=>
isInside(d.latitude,d.longitude,flandreBounds));

}



filtered.forEach(data=>{

const marker=L.circleMarker(
[data.latitude,data.longitude],
{

color:'#2e7d32',
fillColor:'#4CAF50',
radius:7,
weight:1.5,
fillOpacity:0.85

});


const popupContent=`

<b>Observation de hérisson</b><br><br>

<b>Date :</b> ${data.date}<br>

<b>Méthode :</b> ${data.methode}<br>

${data.notes ? `<b>Notes :</b> ${data.notes}` : ''}

`;

marker.bindPopup(popupContent);

markers.addLayer(marker);

});


document.getElementById("stats").innerHTML=

`<b>${filtered.length}</b> observations affichées`;

}



document.getElementById('regionFilter')
.addEventListener('change',e=>{

displayMarkers(e.target.value);

});


loadRecensements();

</script>


</body>
</html>
