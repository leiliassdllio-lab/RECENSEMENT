<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil – Hérisson</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html {
      scroll-behavior: smooth;
    }

    /* --- Général --- */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      background: #f7f7f7;
      color: #111;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 0;
    }

    h2 {
      color: #4CAF50;
      text-align: center;
      margin-bottom: 20px;
    }

    /* BADGES */
    .badges-container {
      display: flex; /* Aligne les badges horizontalement */
      justify-content: space-around; /* Espace entre les badges */
      flex-wrap: wrap; /* Permet le retour à la ligne si nécessaire */
      margin: 20px 0; /* Espace autour du conteneur */
    }

    .badge-box {
      background-color: #f0f0f0; /* Couleur d'arrière-plan du badge */
      border-radius: 15px; /* Bords arrondis */
      padding: 15px; /* Espace intérieur */
      width: 100px; /* Largeur fixe du badge */
      text-align: center; /* Centre le contenu */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Ombre légère */
      margin: 10px; /* Espace entre les badges */
    }

    .badge img {
      width: 80%; /* Ajuste la taille de l'image */
      height: auto; /* Conserve le ratio d'aspect */
    }

    .progress-bar {
      background-color: #e0e0e0; /* Couleur de fond de la barre de progression */
      border-radius: 10px; /* Bords arrondis de la barre */
      height: 10px; /* Hauteur de la barre */
      margin-top: 10px; /* Espace au-dessus de la barre */
    }

    .progress-fill {
      background-color: #76c7c0; /* Couleur de la barre de progression */
      height: 100%; /* Remplit toute la hauteur de la barre */
      border-radius: 10px; /* Bords arrondis de la couleur de progression */
      transition: width 0.3s; /* Animation douce lors du changement de largeur */
    }

    .progress-text {
      margin-top: 5px; /* Espace au-dessus du texte de progression */
      font-size: 12px; /* Taille du texte */
      color: #555; /* Couleur du texte */
    }

    /* Autres styles... */

  </style>
</head>
<body>
  <main class="container profile-page">
    <section class="profile-header">
      <div class="profile-photo">
        <img id="userPhoto" src="avatar_default.png" alt="Photo de profil">
        <input type="file" id="photoUpload" accept="image/*" style="display:none;">
        <button onclick="document.getElementById('photoUpload').click();">Changer la photo</button>
      </div>

      <div class="profile-info">
        <h2 id="username"></h2>
        <p id="userEmail"></p>
        <button onclick="window.location.href='Cartographie.html';" class="btn">Mes Recensements</button>
      </div>
    </section>

    <section class="profile-badges">
      <h3>Mes Badges</h3>
      <div class="badges-container">
        <!-- Badge 1 -->
        <div class="badge-box">
          <div class="badge" id="badge-quiz" data-tooltip="Compléter tous les quiz">
            <img src="badge_quiz.png" alt="Badge Quiz">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-quiz"></div>
            </div>
            <span class="progress-text" id="progress-text-quiz">0/1</span>
          </div>
        </div>

        <!-- Badge 2 -->
        <div class="badge-box">
          <div class="badge" id="badge-1" data-tooltip="Vous devez recenser 1 hérisson pour débloquer ce badge">
            <img src="badge1.png" alt="Badge 1 recensement">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-1"></div>
            </div>
            <span class="progress-text" id="progress-text-1">0/1</span>
          </div>
        </div>

        <!-- Badge 3 -->
        <div class="badge-box">
          <div class="badge" id="badge-5" data-tooltip="Vous devez recenser 5 hérissons pour débloquer ce badge">
            <img src="badge5.png" alt="Badge 5 recensements">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-5"></div>
            </div>
            <span class="progress-text" id="progress-text-5">0/5</span>
          </div>
        </div>

        <!-- Badge 4 -->
        <div class="badge-box">
          <div class="badge" id="badge-10" data-tooltip="Vous devez recenser 10 hérissons pour débloquer ce badge">
            <img src="badge10.png" alt="Badge 10 recensements">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-10"></div>
            </div>
            <span class="progress-text" id="progress-text-10">0/10</span>
          </div>
        </div>

        <!-- Badge 5 -->
        <div class="badge-box">
          <div class="badge" id="badge-photo" data-tooltip="Meilleure photo du mois">
            <img src="badge_photo.png" alt="Meilleure photo">
            <p>Meilleure photo</p>
          </div>
        </div>
      </div>
    </section>
  </main>

    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        localStorage.removeItem("username");
        window.location.href = "login.html";
      });
    }

    const photoInput = document.getElementById('photoUpload');
    const userPhoto = document.getElementById('userPhoto');
    photoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          userPhoto.src = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

      const q = query(collection(db, "recensements"), where("uid", "==", uid));
      const snapshot = await getDocs(q);
      return snapshot.size;
